<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Listeners Lab</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>JavaScript Event Listeners Lab</h1>

        <button id="changeColorBtn">
            Change Background Color
        </button>

        <button id="resetColorBtn">
            Double Click to Reset
        </button>

        <h2>Keyboard Input</h2>
        <p id="keyDisplay">Press any key...</p>

        <h2>Text Input</h2>

        <input
            type="text"
            id="textInput"
            placeholder="Type something..."
        >

        <p id="textDisplay">
            Your text will appear here...
        </p>

        <h2>Combined Events</h2>

        <p id="combinedOutput">
            Interact with the page!
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
